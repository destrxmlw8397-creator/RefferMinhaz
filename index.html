<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        body {
            background: #0f0f1a;
            color: #e4e4f0;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .task-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 18px 16px;
            margin-bottom: 14px;
            border: 1px solid #2a2a44;
            transition: 0.2s;
        }
        .task-title {
            font-size: 17px;
            font-weight: 600;
        }
        .task-reward {
            color: #fbbf24;
            background: #2a2a44;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
        }
        .btn {
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            min-width: 100px;
        }
        .btn-start {
            background: #3b82f6;
            color: white;
        }
        .btn-start:active {
            transform: scale(0.96);
        }
        .btn-verify {
            background: #f59e0b;
            color: #0f0f1a;
        }
        .btn-verify:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-claimed {
            background: #22c55e;
            color: white;
            cursor: default;
            opacity: 0.8;
        }
        .btn-claimed:disabled {
            opacity: 0.9;
        }
        .timer-text {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 6px;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .balance-badge {
            background: #2a2a44;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
        }
        .balance-badge span {
            color: #fbbf24;
        }
        #debug {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #94a3b8;
            border: 1px solid #2a2a44;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-lg mx-auto">
        <div class="header">
            <h1 class="text-2xl font-bold">🎯 Earn</h1>
            <div class="balance-badge">💰 <span id="userBalance">0</span> Coins</div>
        </div>
        <div id="debug"></div>
        <div id="taskList"></div>
        <div id="loading" class="text-center py-10 text-gray-400">⏳ Loading tasks...</div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Debug element
        const debugEl = document.getElementById('debug');
        const initData = tg.initData || '';

        // Show debug info
        debugEl.style.display = 'block';
        if (initData) {
            debugEl.innerHTML = `✅ InitData received (length: ${initData.length})`;
            debugEl.style.borderColor = '#22c55e';
        } else {
            debugEl.innerHTML = `❌ No initData! Make sure:<br>
                1. BotFather has set domain: <code>/setdomain</code> → <code>https://refferminhaz.onrender.com</code><br>
                2. Open this page only from Telegram (not browser directly)`;
            debugEl.style.borderColor = '#ef4444';
            document.getElementById('loading').innerHTML = '❌ Cannot load tasks. Please open from Telegram.';
            throw new Error('No initData');
        }

        // DOM references
        const taskListEl = document.getElementById('taskList');
        const loadingEl = document.getElementById('loading');
        const balanceEl = document.getElementById('userBalance');

        // --- API calls ---
        async function fetchTasks() {
            try {
                const resp = await fetch(`/api/tasks?init_data=${encodeURIComponent(initData)}`);
                if (!resp.ok) {
                    const errorText = await resp.text();
                    throw new Error(`HTTP ${resp.status}: ${errorText}`);
                }
                return await resp.json();
            } catch (err) {
                console.error('Fetch tasks error:', err);
                throw err;
            }
        }

        async function verifyTask(taskId) {
            try {
                const resp = await fetch('/api/verify-task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId, init_data: initData })
                });
                return await resp.json();
            } catch (err) {
                console.error('Verify task error:', err);
                return { status: 'error', message: err.message };
            }
        }

        // --- Render tasks ---
        function renderTasks(data) {
            const tasks = data.tasks || [];
            const balance = data.balance || 0;
            balanceEl.textContent = balance.toFixed(1);

            if (tasks.length === 0) {
                taskListEl.innerHTML = `<p class="text-center text-gray-400">No tasks available right now.</p>`;
                return;
            }

            let html = '';
            tasks.forEach(task => {
                const status = task.status; // 'available', 'pending', 'claimed'
                let btnHtml = '';
                let timerHtml = '';

                if (status === 'available') {
                    btnHtml = `<button class="btn btn-start" data-task-id="${task.id}" data-action="start">▶ Start</button>`;
                } else if (status === 'pending') {
                    btnHtml = `<button class="btn btn-verify" data-task-id="${task.id}" data-action="verify" disabled>⏳ Verify</button>`;
                    timerHtml = `<div class="timer-text" id="timer-${task.id}">⏱ Wait 30s</div>`;
                } else if (status === 'claimed') {
                    btnHtml = `<button class="btn btn-claimed" disabled>✅ Claimed</button>`;
                }

                html += `
                    <div class="task-card" data-task-id="${task.id}">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="task-title">${task.title}</div>
                                <div class="task-reward mt-1">💰 ${task.reward} Coins</div>
                            </div>
                            <div class="flex flex-col items-end">
                                ${btnHtml}
                                ${timerHtml}
                            </div>
                        </div>
                    </div>
                `;
            });

            taskListEl.innerHTML = html;

            // --- Event: Start button ---
            document.querySelectorAll('button[data-action="start"]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const taskId = parseInt(this.dataset.taskId);
                    this.disabled = true;
                    this.textContent = '⏳ Starting...';

                    const result = await verifyTask(taskId);
                    if (result.status === 'pending') {
                        // Change button to Verify with timer
                        this.textContent = '⏳ Verify';
                        this.className = 'btn btn-verify';
                        this.dataset.action = 'verify';
                        this.disabled = true;

                        // Add timer display
                        const card = this.closest('.task-card');
                        let timerDiv = card.querySelector('.timer-text');
                        if (!timerDiv) {
                            timerDiv = document.createElement('div');
                            timerDiv.className = 'timer-text';
                            timerDiv.id = `timer-${taskId}`;
                            card.querySelector('.flex').appendChild(timerDiv);
                        }
                        let remaining = 30;
                        timerDiv.textContent = `⏳ ${remaining}s`;

                        const interval = setInterval(() => {
                            remaining--;
                            if (remaining <= 0) {
                                clearInterval(interval);
                                timerDiv.textContent = '✅ Ready to verify!';
                                // Enable verify button
                                const verifyBtn = card.querySelector('button[data-action="verify"]');
                                if (verifyBtn) {
                                    verifyBtn.disabled = false;
                                    verifyBtn.textContent = '✅ Verify';
                                    verifyBtn.onclick = async function() {
                                        this.disabled = true;
                                        this.textContent = '⏳ Verifying...';
                                        const res = await verifyTask(taskId);
                                        if (res.status === 'success') {
                                            this.textContent = `✅ +${res.reward} Coins`;
                                            this.className = 'btn btn-claimed';
                                            this.disabled = true;
                                            timerDiv.textContent = '🎉 Claimed!';
                                            balanceEl.textContent = (parseFloat(balanceEl.textContent) + res.reward).toFixed(1);
                                        } else {
                                            this.textContent = 'Retry';
                                            this.disabled = false;
                                            alert(res.message || 'Verification failed');
                                        }
                                    };
                                }
                            } else {
                                timerDiv.textContent = `⏳ ${remaining}s`;
                            }
                        }, 1000);

                    } else if (result.status === 'success') {
                        // Direct success (no timer needed)
                        this.textContent = `✅ +${result.reward} Coins`;
                        this.className = 'btn btn-claimed';
                        this.disabled = true;
                        balanceEl.textContent = (parseFloat(balanceEl.textContent) + result.reward).toFixed(1);
                    } else {
                        this.textContent = 'Start';
                        this.disabled = false;
                        alert(result.message || 'Could not start task');
                    }
                });
            });
        }

        // --- Initialization ---
        async function init() {
            try {
                const data = await fetchTasks();
                loadingEl.style.display = 'none';
                renderTasks(data);
            } catch (e) {
                loadingEl.innerHTML = `❌ Failed to load tasks: ${e.message}`;
                console.error(e);
            }
        }

        // Run on page load
        init();
    </script>
</body>
</html>
